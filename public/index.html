<!DOCTYPE html>
<html>
<head>
   <title>Student Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<body class="bg-light">

<div class="container mt-5">

    <!-- Logout button -->
    <button onclick="logout()" class="btn btn-danger float-end mb-2">Logout</button>

    <h2 class="text-center mb-4">Student Management System</h2>

    <!-- Form -->
    <div class="card p-4 mb-4 shadow">
        <div class="row">
            <div class="col">
                <input id="name" class="form-control" placeholder="Name">
            </div>
            <div class="col">
                <input id="roll" class="form-control" placeholder="Roll No">
            </div>
            <div class="col">
                <input id="dept" class="form-control" placeholder="Department">
            </div>
            <div class="col">
                <input id="marks" class="form-control" placeholder="Marks">
            </div>
            <div class="col">
                <button onclick="addStudent()" class="btn btn-primary w-100">Save</button>
            </div>
        </div>
    </div>

    <!-- Search box -->
<div class="mb-3">
    <input 
        type="text" 
        id="search" 
        class="form-control" 
        placeholder="Search students..."
        onkeyup="searchStudents()"
    >
</div>

    <!-- Table -->
    <div class="card p-3 shadow">
        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Roll</th>
                    <th>Dept</th>
                    <th>Marks</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</body>
</html>
